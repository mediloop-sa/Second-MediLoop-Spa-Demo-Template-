<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLoop | Secure Owner Portal</title>
    <link rel="stylesheet" href="globals.css">
    <style>
        body { 
            margin: 0; 
            background-color: var(--brand-anchor); 
            color: var(--brand-canvas); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            flex-direction: column; 
            padding: 20px;
            box-sizing: border-box;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 50px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }
        h2 { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-top: 0;
            margin-bottom: 30px; 
        }
        .input-field { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: transparent; 
            color: var(--brand-canvas); 
            box-sizing: border-box; 
            font-family: 'Open Sans', sans-serif;
            outline: none;
            transition: border 0.3s;
        }
        .input-field:focus {
            border: 1px solid var(--brand-canvas);
        }
        .btn-login { 
            background: var(--brand-canvas); 
            color: var(--brand-anchor); 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-bottom: 20px; 
            font-family: 'Montserrat', sans-serif;
        }
        .btn-login:hover { 
            background: var(--brand-medium); 
            color: var(--brand-canvas); 
        }
        .dashboard-mockup { 
            display: none; 
            text-align: left; 
            max-width: 600px;
        }
        .email-list { 
            background: rgba(0,0,0,0.2); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-family: monospace; 
            line-height: 1.8;
            overflow-x: auto;
        }
        .export-btn { 
            background: var(--brand-accent); 
            color: var(--brand-anchor); 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: 0.3s;
            width: 100%;
        }
        .export-btn:hover {
            background: var(--brand-canvas);
        }
    </style>
</head>
<body>

    <p style="font-family: 'Montserrat', sans-serif; font-weight: 300; letter-spacing: 4px; color: var(--brand-medium); margin-bottom: 30px; text-transform: uppercase; text-align: center;">MEDILOOP WEBSITES</p>

    <div class="glass-panel" id="login-view">
        <h2>Secure Portal</h2>
        <input type="password" class="input-field" placeholder="Enter Master Password">
        <button class="btn-login" onclick="mockLogin()">Access Data</button>
        <p style="font-size: 0.8rem; color: var(--brand-medium); margin: 0;">Protected by AES-256 Encryption</p>
    </div>

    <div class="glass-panel dashboard-mockup" id="dash-view">
        <h2>Client Directory</h2>
        <p style="color: var(--brand-medium); margin-bottom: 20px;">Active Newsletter Subscribers</p>
        <div class="email-list">
            client1@example.com<br>
            vip.guest@gmail.com<br>
            bookings@wellness.co.za
        </div>
        <button class="export-btn">Download CSV for Outlook/Gmail</button>
    </div>

    <div id="cookie-banner" style="position: fixed; bottom: 0; left: 0; width: 100%; background: var(--brand-anchor); color: var(--brand-canvas); padding: 15px 20px; text-align: center; z-index: 9999; font-family: 'Open Sans', sans-serif; font-size: 0.85rem; box-sizing: border-box; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.05);">
        <span>We use cookies to ensure you get the best experience on our website.</span>
        <button onclick="acceptCookies()" style="padding: 8px 25px; background: var(--brand-canvas); color: var(--brand-anchor); border: none; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem;">Got it</button>
    </div>

    <script>
        // Portal visual toggle
        function mockLogin() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'block';
        }

        // Cookie Consent Logic
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('cookiesAccepted') === 'true') {
                const banner = document.getElementById('cookie-banner');
                if (banner) banner.style.display = 'none';
            }
        });

        function acceptCookies() {
            document.getElementById('cookie-banner').style.display = 'none';
            localStorage.setItem('cookiesAccepted', 'true');
        }
    </script>
</body>
</html>
