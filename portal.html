<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière Spa | Owner Portal</title>
    <link rel="stylesheet" href="globals.css">
    <style>
        /* Private Portal Styles - Kept securely out of globals.css */
        body { 
            margin: 0; 
            background-color: var(--bg-canvas); 
            color: var(--text-dark); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            flex-direction: column; 
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }
        .glass-panel { 
            background: #FFFFFF; 
            border: 1px solid rgba(58, 53, 50, 0.1); 
            padding: 50px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(58, 53, 50, 0.08); 
            box-sizing: border-box;
        }
        h2 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
            letter-spacing: 2px; 
            margin-top: 0;
            margin-bottom: 30px; 
            color: var(--text-dark);
        }
        .input-field { 
            width: 100%; 
            padding: 16px 25px; 
            margin-bottom: 20px; 
            border-radius: 50px; 
            border: 1px solid rgba(58, 53, 50, 0.2); 
            background: transparent; 
            color: var(--text-dark); 
            box-sizing: border-box; 
            font-family: 'Open Sans', sans-serif;
            outline: none;
            transition: border 0.3s;
        }
        .input-field:focus {
            border: 1px solid var(--text-dark);
        }
        .btn-login { 
            background: var(--text-dark); 
            color: #FFFFFF; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 50px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-bottom: 20px; 
            font-family: 'Open Sans', sans-serif;
        }
        .btn-login:hover { 
            background: var(--text-muted); 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(58, 53, 50, 0.15);
        }
        .dashboard-mockup { 
            display: none; 
            text-align: left; 
            max-width: 600px;
        }
        .email-list { 
            background: var(--blush-pink); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            font-family: monospace; 
            line-height: 1.8;
            overflow-x: auto;
            color: var(--text-dark);
        }
        .export-btn { 
            background: var(--bg-canvas); 
            color: var(--text-dark); 
            border: 1px solid var(--text-dark); 
            padding: 14px 20px; 
            border-radius: 50px; 
            font-weight: 600; 
            cursor: pointer; 
            font-family: 'Open Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: 0.3s ease;
            width: 100%;
        }
        .export-btn:hover {
            background: var(--text-dark);
            color: #FFFFFF;
        }
    </style>
</head>
<body>

    <p style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text-dark); margin-bottom: 30px; text-align: center;">🌿 Lumière Spa <span style="display:block; font-family: 'Open Sans', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; color: var(--text-muted);">Owner Portal</span></p>

    <div class="glass-panel" id="login-view">
        <h2>Secure Access</h2>
        <input type="password" class="input-field" placeholder="Enter Master Password">
        <button class="btn-login" onclick="mockLogin()">Access Data</button>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">Protected by AES-256 Encryption</p>
    </div>

    <div class="glass-panel dashboard-mockup" id="dash-view">
        <h2>Client Directory</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem;">Active Newsletter Subscribers</p>
        <div class="email-list">
            client1@example.com<br>
            vip.guest@gmail.com<br>
            bookings@wellness.co.za
        </div>
        <button class="export-btn">Download CSV for Outlook/Gmail</button>
    </div>

    <script>
        // Portal visual toggle
        function mockLogin() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'block';
        }
    </script>
</body>
</html>
